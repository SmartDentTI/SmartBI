<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBI · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7; --card: #ffffff; --dark: #1d1d1f; --mid: #6e6e73;
  --light: #aeaeb2; --border: #e5e5ea; --border-light: #f2f2f7;
  --ac: #0071e3; --ac-bg: #e8f1fb; --r: 12px; --rl: 16px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden;
}
.app { height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ───────────────────────────────────────────── */
.topbar {
  height: 48px; flex-shrink: 0;
  background: rgba(255,255,255,0.9);
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
}
.tb-appico {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(150deg, #0071e3, #34aadc);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tb-appname { font-size: 13px; font-weight: 600; color: var(--dark); letter-spacing: -0.01em; }
.tb-sep { flex: 1; }
.badge-live {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: #27500A;
  background: #eaf3de; padding: 3px 10px; border-radius: 99px;
}
.badge-live::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%; background: #34c759;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.tb-av {
  width: 28px; height: 28px; border-radius: 50%; background: var(--ac);
  color: #fff; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; position: relative;
}
.tb-menu {
  display: none; position: absolute; top: 36px; right: 0;
  background: #fff; border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  min-width: 180px; z-index: 100; overflow: hidden;
}
.tb-menu.open { display: block; }
.tb-menu-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; font-size: 13px; color: var(--dark);
  cursor: pointer; transition: background .1s;
}
.tb-menu-item:hover { background: var(--bg); }
.tb-menu-item.danger { color: var(--danger); }
.tb-menu-sep { height: 0.5px; background: var(--border); margin: 4px 0; }
.tb-user-info { padding: 10px 14px 6px; }
.tb-user-name { font-size: 12px; font-weight: 600; color: var(--dark); }
.tb-user-sub  { font-size: 11px; color: var(--mid); }

/* ── IFRAME ───────────────────────────────────────────── */
.iframe-wrap {
  flex: 1; overflow: hidden; position: relative;
}
.iframe-wrap iframe {
  width: 100%;
  height: calc(100% + 40px);
  margin-top: -40px;
  border: none; display: block;
}
</style>
</head>
<body>

<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-appico">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
    </div>
    <div class="tb-appname">SmartBI</div>
    <div class="tb-sep"></div>
    <div class="badge-live">En vivo</div>
    <div style="width:8px"></div>
    <div class="tb-av" id="tb-av" onclick="toggleMenu()">
      <span id="tb-initials">??</span>
      <div class="tb-menu" id="tb-menu">
        <div class="tb-user-info">
          <div class="tb-user-name" id="tb-user-name">—</div>
          <div class="tb-user-sub" id="tb-user-sub">SmartDent</div>
        </div>
        <div class="tb-menu-sep"></div>
        <div class="tb-menu-item" onclick="window.location.href='https://smartapps-production.up.railway.app'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Volver a SmartApps
        </div>
        <div class="tb-menu-item danger" onclick="window.location.href='/logout'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Cerrar sesión
        </div>
      </div>
    </div>
  </div>

  <!-- IFRAME -->
  <div class="iframe-wrap">
    <iframe
      title="Dashboard SmartDent"
      src="https://app.powerbi.com/view?r=eyJrIjoiY2UzZmFhZGYtZDYwZS00MjE2LWFmNzAtNDZhNjQ2ODQ1MDVkIiwidCI6IjdlNmNmZjIwLWM1OTEtNGRkMy05NDJhLWJiNTc5OWY4OTFmMSJ9&pageName=0db1d61e7afaccd70b04"
      allowfullscreen="true"
      loading="eager">
    </iframe>
  </div>
</div>

<script>
/* ── USUARIO EN TOPBAR ──────────────────────────────────────── */
const _nombre   = "{{ usuario }}" || "?";
const _sucursal = "{{ sucursal }}" || "SmartDent";
const _initials = _nombre.split(" ").map(p => p[0]).join("").slice(0,2).toUpperCase();
document.getElementById('tb-initials').textContent  = _initials;
document.getElementById('tb-user-name').textContent = _nombre;
document.getElementById('tb-user-sub').textContent  = _sucursal || "SmartDent";

/* ── MENU USUARIO ───────────────────────────────────────────── */
function toggleMenu() {
  document.getElementById('tb-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('tb-av').contains(e.target))
    document.getElementById('tb-menu').classList.remove('open');
});

/* ── INACTIVIDAD 15 MIN ─────────────────────────────────────── */
let _t;
function resetTimer() {
  clearTimeout(_t);
  _t = setTimeout(() => { window.location.href = "/logout"; }, 15 * 60 * 1000);
}
["mousemove","click","keydown","scroll","touchstart"].forEach(e => {
  document.addEventListener(e, resetTimer, true);
});
resetTimer();
</script>
</body>
</html>
