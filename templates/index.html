<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBI · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7; --card: #ffffff; --dark: #1d1d1f; --mid: #6e6e73;
  --light: #aeaeb2; --border: #e5e5ea; --ac: #0071e3; --ac-bg: #e8f1fb;
  --r: 12px; --rl: 16px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden;
}
.app { height: 100vh; display: flex; flex-direction: row; }

/* ── SIDEBAR ──────────────────────────────────────────── */
.sb {
  width: 210px; flex-shrink: 0;
  border-right: 0.5px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.72);
  display: flex; flex-direction: column; height: 100vh;
}
.sb-top { padding: 16px 13px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
.sb-approw { display: flex; align-items: center; gap: 9px; }
.sb-appico {
  width: 33px; height: 33px; border-radius: 9px;
  background: linear-gradient(150deg, #0071e3, #34aadc);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sb-appname { font-size: 13px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.01em; }
.sb-apptag  { font-size: 11px; color: #6e6e73; }
.sb-sec {
  font-size: 10px; font-weight: 600; color: #8a8a8e;
  letter-spacing: 0.05em; text-transform: uppercase; padding: 10px 13px 4px;
}
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 7px 7px 13px; cursor: pointer;
  border-radius: 8px; margin: 0 4px;
  color: #1d1d1f; font-size: 13px;
  transition: background .1s; user-select: none;
}
.sb-item:hover { background: rgba(0,0,0,0.05); }
.sb-item.on    { background: rgba(0,0,0,0.08); font-weight: 500; }
.sb-ico {
  width: 22px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: #e8f1fb;
}
.sb-bot { margin-top: auto; border-top: 0.5px solid rgba(0,0,0,0.07); padding: 8px 4px 6px; }
.sb-sw {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 9px; border-radius: 8px; cursor: pointer;
  font-size: 12px; color: #6e6e73; transition: background .1s;
}
.sb-sw:hover { background: rgba(0,0,0,0.05); color: #1d1d1f; }
.sb-urow { display: flex; align-items: center; gap: 8px; padding: 6px 9px 8px; }
.sb-av {
  width: 28px; height: 28px; border-radius: 50%; background: var(--ac);
  color: #fff; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── BADGE LIVE ───────────────────────────────────────── */
.badge-live {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; color: #27500A;
  background: #eaf3de; padding: 2px 8px; border-radius: 99px;
  margin-top: 6px;
}
.badge-live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: #34c759;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── CONTENT ──────────────────────────────────────────── */
.ct {
  flex: 1; background: var(--bg);
  height: 100vh; display: flex; flex-direction: column;
}

/* ── IFRAMES ──────────────────────────────────────────── */
.iframe-wrap {
  flex: 1; overflow-x: hidden; overflow-y: auto; position: relative;
  background: #ffffff;
}
@media(min-width: 1025px) {
  .ct { background: #ffffff; }
  .iframe-wrap { overflow-y: hidden; } /* en desktop no scroll, el transform recorta el fondo */
}
.iframe-wrap iframe {
  border: none; display: block;
}

/* ── BOTÓN PANTALLA COMPLETA ──────────────────────────── */
.btn-fullscreen {
  display: flex; align-items: center; gap: 6px;
  margin: 0 4px 4px; padding: 7px 9px;
  border-radius: 8px; cursor: pointer; border: none;
  background: var(--ac-bg); color: var(--ac);
  font-family: "Inter", sans-serif; font-size: 12px; font-weight: 600;
  transition: background .1s; width: calc(100% - 8px);
}
.btn-fullscreen:hover { background: #d0e6fa; }

/* ── CARD MÓVIL (portrait) ────────────────────────────── */
.mobile-card {
  display: none;
  flex: 1; align-items: center; justify-content: center;
  padding: 32px 24px; flex-direction: column; gap: 20px; text-align: center;
}
.mobile-card-icon {
  width: 64px; height: 64px; border-radius: 16px;
  background: linear-gradient(150deg, #0071e3, #34aadc);
  display: flex; align-items: center; justify-content: center;
}
.mobile-card-title { font-size: 18px; font-weight: 700; color: var(--dark); }
.mobile-card-sub   { font-size: 13px; color: var(--mid); line-height: 1.5; }
.mobile-card-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px; background: var(--ac); color: #fff;
  border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
  font-family: "Inter", sans-serif; cursor: pointer; transition: background .15s;
}
.mobile-card-btn:hover { background: #005fcc; }
.mobile-rotate {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--mid);
}

/* ── HAMBURGER / MOBILE ───────────────────────────────── */
.hbtn {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  width: 36px; height: 36px; border-radius: 9px; background: #fff;
  border: 0.5px solid rgba(0,0,0,0.1); align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
.sb-overlay.on { display: block; }

/* móvil por ancho O por dispositivo táctil (cubre phones landscape anchos) */
@media(max-width: 1024px), (pointer: coarse) {
  body { overflow: auto; }
  .app { flex-direction: column; height: auto; min-height: 100vh; }
  .hbtn { display: flex; }
  .sb {
    position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
    transform: translateX(-100%); transition: transform .25s ease; width: 240px;
  }
  .sb.open { transform: translateX(0); }
  .ct { width: 100%; height: 100vh; }
  .iframe-wrap { height: 100vh; overflow-y: auto; }
}

/* portrait móvil: ocultar iframe, mostrar card */
@media(max-width: 600px) and (orientation: portrait) {
  .iframe-wrap { display: none; }
  .mobile-card { display: flex; }
}
</style>
</head>
<body>

<button class="hbtn" onclick="toggleSb()" aria-label="Menu">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d1d1f" stroke-width="2.2">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>
<div class="sb-overlay" id="sb-overlay" onclick="closeSb()"></div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sb" id="sidebar">
    <div class="sb-top">
      <div class="sb-approw">
        <div class="sb-appico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
          </svg>
        </div>
        <div>
          <div class="sb-appname">SmartBI</div>
          <div class="sb-apptag">Dashboard ejecutivo</div>
        </div>
      </div>
      <div class="badge-live">En vivo</div>
    </div>

    <div class="sb-sec">Reportes</div>
    {% for r in reportes %}
    <div class="sb-item {% if loop.first %}on{% endif %}" id="ni-{{ r.id }}" onclick="verReporte('{{ r.id }}', '{{ r.url }}', '{{ r.nombre }}', this)">
      <div class="sb-ico">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0071e3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
      </div>
      {{ r.nombre }}
    </div>
    {% endfor %}

    <div style="padding: 8px 4px 0;">
      <button class="btn-fullscreen" id="btn-fs" onclick="abrirFullscreen()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        Abrir en pantalla completa
      </button>
    </div>

    <div class="sb-bot">
      <div class="sb-urow">
        <div class="sb-av" id="sb-av-initials">??</div>
        <div>
          <div style="font-size:12px;font-weight:500;color:#1d1d1f" id="sb-user-name">—</div>
          <div style="font-size:10px;color:#aeaeb2" id="sb-user-sucursal">SmartDent</div>
        </div>
      </div>
      <div class="sb-sw" onclick="window.location.href='/logout'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
      </div>
      <div class="sb-sw" style="font-size:11px;color:var(--light);padding:4px 9px 0"
           onclick="window.location.href='https://smartapps-production.up.railway.app'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Volver a SmartApps
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="ct">
    <div class="mobile-card" id="mobile-card">
      <div class="mobile-card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
      </div>
      <div>
        <div class="mobile-card-title" id="mc-titulo">Resumen</div>
        <div class="mobile-card-sub">El reporte se ve mejor en pantalla completa o girando el teléfono.</div>
      </div>
      <button class="mobile-card-btn" id="mc-btn" onclick="abrirFullscreen()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        Abrir en pantalla completa
      </button>
      <div class="mobile-rotate">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        O gira el teléfono para verlo aquí
      </div>
    </div>
    <div class="iframe-wrap" id="iframe-wrap">
      <div style="height:60px;background:#fff;flex-shrink:0"></div>
      {% for r in reportes %}
      <iframe
        id="frame-{{ r.id }}"
        title="{{ r.nombre }}"
        src="{{ r.url }}"
        allowfullscreen="true"
        loading="{% if loop.first %}eager{% else %}lazy{% endif %}"
        style="{% if not loop.first %}display:none{% endif %}">
      </iframe>
      {% endfor %}
    </div>
  </div>
</div>

<script>
/* ── USUARIO ────────────────────────────────────────────────── */
const _nombre   = "{{ usuario }}" || "?";
const _sucursal = "{{ sucursal }}" || "SmartDent";
const _initials = _nombre.split(" ").map(p => p[0]).join("").slice(0,2).toUpperCase();
document.getElementById('sb-av-initials').textContent  = _initials;
document.getElementById('sb-user-name').textContent     = _nombre;
document.getElementById('sb-user-sucursal').textContent = _sucursal || "SmartDent";

/* ── NAVEGACIÓN REPORTES ────────────────────────────────────── */
let _urlActual = document.querySelector('.iframe-wrap iframe') ? document.querySelector('.iframe-wrap iframe').src : '';
let _nombreActual = '{{ reportes[0].nombre }}';

function verReporte(id, url, nombre, el) {
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.iframe-wrap iframe').forEach(f => f.style.display = 'none');
  const frame = document.getElementById('frame-' + id);
  frame.style.display = 'block';
  ajustarIframe();
  _urlActual = url;
  _nombreActual = nombre;
  document.getElementById('mc-titulo').textContent = nombre;
  closeSb();
}

function abrirFullscreen() {
  window.open(_urlActual, '_blank');
}

/* ── MOBILE SIDEBAR ─────────────────────────────────────────── */
function toggleSb() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('on');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('on');
}

/* ── ESCALADO AUTOMÁTICO DEL IFRAME ────────────────────────── */
const PBI_W   = 1024;
const PBI_H   = 1060;
const TOP_BAR = 36; /* barra superior PBI */
const BOT_CUT = 570; /* recorta barra inferior + espacio vacío de fondo */

function ajustarIframe() {
  const wrap   = document.getElementById('iframe-wrap');
  const frames = wrap.querySelectorAll('iframe');
  const frame  = Array.from(frames).find(f => f.style.display !== 'none') || frames[0];
  if (!frame) return;

  const W         = wrap.clientWidth;
  const H         = wrap.clientHeight;
  const VISIBLE_H = PBI_H - BOT_CUT;

  frame.style.width  = PBI_W + 'px';
  frame.style.height = PBI_H + 'px';

  const isDesktop = window.innerWidth > 1024 && !window.matchMedia('(pointer: coarse)').matches;
  if (isDesktop) {
    /* Desktop (mouse): transform no entra al iframe — PBI no altera su zoom interno */
    const scale = Math.min(W / PBI_W, H / VISIBLE_H) * 0.88;
    frame.style.zoom            = '1';
    frame.style.marginTop       = '0';
    frame.style.transform       = 'translateY(' + (-Math.round(TOP_BAR * scale)) + 'px) scale(' + scale + ')';
    frame.style.transformOrigin = 'top left';
  } else {
    /* Móvil/tablet (touch): zoom para que el scroll funcione correctamente */
    const scale = W / PBI_W;
    frame.style.zoom            = String(scale);
    frame.style.marginTop       = '-' + Math.round(TOP_BAR * scale) + 'px';
    frame.style.transform       = 'none';
    frame.style.transformOrigin = '';
  }
}

window.addEventListener('resize', ajustarIframe);
ajustarIframe();

/* ── INACTIVIDAD 15 MIN ─────────────────────────────────────── */
let _t;
function resetTimer() {
  clearTimeout(_t);
  _t = setTimeout(() => { window.location.href = "/logout"; }, 15 * 60 * 1000);
}
["mousemove","click","keydown","scroll","touchstart"].forEach(e => {
  document.addEventListener(e, resetTimer, true);
});
resetTimer();
</script>
</body>
</html>
