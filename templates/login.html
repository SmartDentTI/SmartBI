<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBI · Acceso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1d1d1f}
.wrap{width:100%;max-width:360px;padding:24px;display:flex;flex-direction:column;align-items:center}
.app-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(150deg,#0071e3,#34aadc);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,113,227,0.28)}
.app-name{font-size:22px;font-weight:600;letter-spacing:-0.03em;color:#1d1d1f;margin-bottom:4px}
.app-sub{font-size:13px;color:#6e6e73;margin-bottom:28px}
.card{width:100%;background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.08);padding:22px 20px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:#6e6e73;letter-spacing:0.02em;text-transform:uppercase}
.field input{padding:10px 12px;border:0.5px solid rgba(0,0,0,0.15);border-radius:9px;font-size:14px;font-family:inherit;color:#1d1d1f;background:#fafafa;outline:none;transition:border-color .15s,background .15s}
.field input:focus{border-color:#0071e3;background:#fff}
.btn-login{width:100%;padding:11px;background:#0071e3;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;margin-top:2px}
.btn-login:hover{background:#005fcc}
.btn-login:active{transform:scale(0.98)}
.btn-login:disabled{background:#80b8f1;cursor:not-allowed;transform:none}
.err{font-size:12px;color:#ff3b30;text-align:center;min-height:16px;margin-top:-4px}
.footer{margin-top:20px;font-size:11px;color:#aeaeb2;text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-icon">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6"  y1="20" x2="6"  y2="14"/>
    </svg>
  </div>
  <div class="app-name">SmartBI</div>
  <div class="app-sub">Dashboard ejecutivo · SmartDent</div>
  <div class="card">
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="Tu usuario" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="err" id="err"></div>
    <button class="btn-login" id="btn" onclick="doLogin()">Iniciar sesión</button>
  </div>
  <div class="footer">
    <a href="https://smartapps-production.up.railway.app" style="font-size:12px;color:#0071e3;text-decoration:none">← Volver a SmartApps</a>
    <span>SmartDent · 2026</span>
  </div>
</div>
<script>
document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
async function doLogin() {
  const btn=document.getElementById("btn"), errEl=document.getElementById("err");
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value;
  errEl.textContent="";
  if (!username||!password){errEl.textContent="Completa todos los campos";return}
  btn.disabled=true; btn.textContent="Verificando…";
  try {
    const res=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(data.ok){window.location.href="/"}
    else{errEl.textContent=data.msg||"Credenciales incorrectas";btn.disabled=false;btn.textContent="Iniciar sesión"}
  } catch {
    errEl.textContent="Error de conexión";btn.disabled=false;btn.textContent="Iniciar sesión";
  }
}
</script>
</body>
</html>
